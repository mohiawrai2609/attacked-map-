<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Attacked.ai — Daily Incident Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --gold:#F5B800;--gold-dim:#D4A000;--gold-tint:rgba(245,184,0,.12);
  --obsidian:#1A1A1A;--obsidian-deep:#080808;--obsidian-card:#242424;--obsidian-elevated:#2E2E2E;
  --white:#fff;--text-secondary:#A8A8A8;--text-muted:#585858;
  --border-subtle:#333;--border-gold:rgba(245,184,0,.3);
  --shadow-gold:0 0 20px rgba(245,184,0,.15);
  --radius-sm:4px;--radius-md:8px;--radius-lg:12px;
  --c5:#FF3B30;--c4:#FF6B35;--c3:#F5B800;--c2:#34C759;--c1:#636366;
  --transition:cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--obsidian);color:var(--white);font-family:'Inter',sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace}
h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:700;line-height:1.1}
a{color:var(--gold);text-decoration:none}

nav{height:64px;background:rgba(26,26,26,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-subtle);
  display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:10}
.brand{font-family:'Inter';font-weight:600;font-size:18px;letter-spacing:-.01em}
.brand .ai{color:var(--gold)}
.brand small{display:block;font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:.08em;text-transform:uppercase}
.controls{display:flex;align-items:center;gap:12px}
select{background:var(--obsidian-card);color:var(--white);border:1px solid var(--border-subtle);border-radius:var(--radius-sm);
  padding:8px 12px;font-family:'JetBrains Mono';font-size:12px;cursor:pointer}
select:focus{outline:none;border-color:var(--border-gold)}

.wrap{max-width:1240px;margin:0 auto;padding:32px}
.hero{margin-bottom:28px}
.hero .date{font-family:'JetBrains Mono';font-size:12px;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.hero h1{font-size:46px;margin-bottom:14px}
.exec{border-left:2px solid var(--gold);padding:10px 0 10px 18px;color:var(--text-secondary);max-width:820px;font-size:15px}
.exec b{color:var(--white)}

.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:28px}
.kpi{background:var(--obsidian-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:18px}
.kpi .v{font-family:'JetBrains Mono';font-size:30px;font-weight:500;line-height:1}
.kpi .l{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-top:8px}
.kpi .d{font-size:11px;font-family:'JetBrains Mono';margin-top:6px}
.up{color:var(--c4)} .down{color:var(--c2)} .flat{color:var(--text-muted)}
.kpi.crit .v{color:var(--c5)} .kpi.major .v{color:var(--c4)} .kpi.total .v{color:var(--gold)}

.grid{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;margin-bottom:20px}
.card{background:var(--obsidian-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:22px;transition:border-color .2s var(--transition),box-shadow .2s var(--transition)}
.card:hover{border-color:var(--border-gold);box-shadow:var(--shadow-gold)}
.card h3{font-size:22px;margin-bottom:4px}
.card .sub{font-size:12px;color:var(--text-muted);margin-bottom:18px}

.catrow{display:flex;align-items:center;gap:10px;margin-bottom:11px;font-size:13px}
.catrow .name{width:150px;color:var(--text-secondary);flex-shrink:0}
.catrow .bar{flex:1;height:8px;background:var(--obsidian-elevated);border-radius:99px;overflow:hidden}
.catrow .fill{height:100%;background:var(--gold);border-radius:99px}
.catrow .num{font-family:'JetBrains Mono';width:64px;text-align:right;flex-shrink:0;color:var(--text-secondary)}
.catrow .num b{color:var(--white)}

.majors{margin-top:8px}
.inc{padding:14px 0;border-bottom:1px solid var(--border-subtle)}
.inc:last-child{border-bottom:none}
.inc .top{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.inc .hl{font-weight:600;font-size:14px;flex:1}
.inc .meta{font-size:12px;color:var(--text-muted);font-family:'JetBrains Mono'}
.inc .meta span{color:var(--text-secondary)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:var(--radius-sm);
  font-family:'JetBrains Mono';font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
.b5{background:rgba(255,59,48,.15);color:#FF6B6B;border:1px solid rgba(255,59,48,.3)}
.b4{background:rgba(255,107,53,.15);color:#FF8C5A;border:1px solid rgba(255,107,53,.3)}
.b3{background:rgba(245,184,0,.15);color:#F5B800;border:1px solid rgba(245,184,0,.3)}
.b2{background:rgba(52,199,89,.15);color:#34C759;border:1px solid rgba(52,199,89,.3)}
.b1{background:rgba(99,99,102,.15);color:#8E8E93;border:1px solid rgba(99,99,102,.3)}
.inc .summary{font-size:13px;color:var(--text-secondary);margin-top:6px;line-height:1.55}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:28px 0 4px}
.section-head h3{font-size:24px}
.filterbar{display:flex;gap:7px;margin:14px 0 6px;flex-wrap:wrap}
.chip{font-family:'JetBrains Mono';font-size:11px;color:var(--text-secondary);background:var(--obsidian-elevated);
  border:1px solid var(--border-subtle);border-radius:99px;padding:4px 12px;cursor:pointer;transition:all .15s var(--transition)}
.chip:hover{border-color:var(--border-gold)}
.chip.on{background:var(--gold-tint);color:var(--gold);border-color:var(--border-gold)}
.cat-chip{font-family:'JetBrains Mono';font-size:10px;color:var(--gold);border:1px solid var(--border-gold);
  border-radius:var(--radius-sm);padding:2px 7px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}

.chartcard{margin-bottom:20px}
.chartwrap{height:240px;position:relative}
footer{color:var(--text-muted);font-size:11px;text-align:center;padding:24px;border-top:1px solid var(--border-subtle);margin-top:20px}
.loading{padding:80px;text-align:center;color:var(--text-muted)}
@media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <div class="brand">Attacked<span class="ai">.ai</span><small>Incident Intelligence · Daily Log</small></div>
  <div class="controls">
    <select id="sweepPicker"></select>
  </div>
</nav>

<div class="wrap" id="app"><div class="loading">Loading intelligence…</div></div>

<footer>Attacked.ai — Confidential Intelligence · Auto-generated from daily sweep data</footer>

<script>
// ---- config ----
const ENDPOINT = "https://ovenyjguhkgiceddzwna.supabase.co/functions/v1/incident-report";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92ZW55amd1aGtnaWNlZGR6d25hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MzQyNDUsImV4cCI6MjA5NDMxMDI0NX0.bfruIPTxmK1oIfZURXjNXIy0tznrpCI8S9OBIHHCOhg";
const CC = {IR:"🇮🇷",US:"🇺🇸",JP:"🇯🇵",ES:"🇪🇸",GB:"🇬🇧",CN:"🇨🇳",DE:"🇩🇪",FR:"🇫🇷",IN:"🇮🇳",RU:"🇷🇺"};
let chart;

async function load(sweepId){
  const url = sweepId ? `${ENDPOINT}?sweep_id=${sweepId}` : ENDPOINT;
  const r = await fetch(url,{headers:{Authorization:`Bearer ${ANON}`}});
  const data = await r.json();
  if(data.error){document.getElementById("app").innerHTML=`<div class="loading">Error: ${data.error}</div>`;return;}
  render(data);
}

function deltaTag(n){
  if(n===null||n===undefined||isNaN(n)) return `<span class="flat">—</span>`;
  if(n>0) return `<span class="up">▲ ${n}</span>`;
  if(n<0) return `<span class="down">▼ ${Math.abs(n)}</span>`;
  return `<span class="flat">flat</span>`;
}

function render(data){
  const rep = data.report, t = rep.totals, d = rep.delta;
  // picker
  const picker = document.getElementById("sweepPicker");
  picker.innerHTML = data.sweeps.map(s=>
    `<option value="${s.sweep_id}" ${s.sweep_id===rep.sweep_id?'selected':''}>${s.sweep_date} · ${s.total_incidents} incidents</option>`).join("");
  picker.onchange = e => load(e.target.value);

  const maxCat = Math.max(...rep.categories.map(c=>c.incidents),1);
  const cats = rep.categories.map(c=>`
    <div class="catrow">
      <div class="name">${c.label}</div>
      <div class="bar"><div class="fill" style="width:${Math.round(c.incidents/maxCat*100)}%"></div></div>
      <div class="num"><b>${c.incidents}</b>${c.major?` · ${c.major}⚑`:''}</div>
    </div>`).join("");

  const majors = rep.major_incidents.length ? rep.major_incidents.map(m=>`
    <div class="inc">
      <div class="top">
        <span class="badge ${m.severity===5?'b5':'b4'}">${m.severity===5?'Critical':'High'} · S${m.severity}</span>
        <span class="hl">${m.headline}</span>
        <span class="cat-chip">${m.category}</span>
      </div>
      <div class="meta">${CC[m.country]||''} <span>${m.entity}</span> · ${m.sector||''}${m.threat_actor?` · ⚔ ${m.threat_actor}`:''}</div>
    </div>`).join("") : `<div class="meta" style="padding:14px 0;color:var(--text-muted)">No major incidents (severity ≥ 4) in this sweep.</div>`;

  const SEV={5:['Critical','b5'],4:['High','b4'],3:['Medium','b3'],2:['Low','b2'],1:['Minimal','b1']};
  const allInc = (rep.incidents||[]).map(m=>{const t=SEV[m.severity]||['','']; return `
    <div class="inc" data-sev="${m.severity}">
      <div class="top">
        <span class="badge ${t[1]}">${t[0]} · S${m.severity}</span>
        <span class="hl">${m.headline}</span>
        <span class="cat-chip">${m.category}</span>
      </div>
      <div class="meta">${CC[m.country]||''} <span>${m.entity||''}</span>${m.sector?` · ${m.sector}`:''}${m.threat_actor?` · ⚔ ${m.threat_actor}`:''}${m.confidence?` · ${m.confidence} conf.`:''}</div>
      ${m.summary?`<div class="summary">${m.summary}</div>`:''}
    </div>`;}).join("");

  document.getElementById("app").innerHTML = `
    <div class="hero">
      <div class="date">Sweep #${rep.sweep_id} · ${rep.sweep_date} · last ${rep.lookback_hours}h</div>
      <h1>Daily Incident Brief</h1>
      <div class="exec">${rep.exec_line.replace(/(\d+ major, \d+ critical)/,'<b>$1</b>')}</div>
    </div>

    <div class="kpis">
      <div class="kpi total"><div class="v">${t.total}</div><div class="l">Incidents</div><div class="d">${deltaTag(d.total_change)} vs prior</div></div>
      <div class="kpi major"><div class="v">${t.major}</div><div class="l">Major (S4+)</div><div class="d">${deltaTag(d.major_change)} vs prior</div></div>
      <div class="kpi crit"><div class="v">${t.critical}</div><div class="l">Critical (S5)</div></div>
      <div class="kpi"><div class="v">${t.avg_severity}</div><div class="l">Avg severity</div></div>
      <div class="kpi"><div class="v">${t.categories}</div><div class="l">Categories</div></div>
      <div class="kpi"><div class="v">${t.countries}</div><div class="l">Countries</div></div>
    </div>

    <div class="card chartcard">
      <h3>14-Day Trend</h3>
      <div class="sub">Total incidents vs major (severity ≥ 4) per day</div>
      <div class="chartwrap"><canvas id="trend"></canvas></div>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Major Incidents</h3>
        <div class="sub">${rep.major_incidents.length} incident(s) at severity 4–5</div>
        <div class="majors">${majors}</div>
      </div>
      <div class="card">
        <h3>By Category</h3>
        <div class="sub">⚑ = major within category</div>
        ${cats}
      </div>
    </div>

    <div class="section-head">
      <h3>All Incidents</h3>
      <span class="sub">${rep.incidents.length} total · ${rep.sweep_date} · full daily log with summaries</span>
    </div>
    <div class="filterbar" id="sevFilter">
      <span class="chip on" data-f="all">All ${rep.incidents.length}</span>
      <span class="chip" data-f="5">Critical</span>
      <span class="chip" data-f="4">High</span>
      <span class="chip" data-f="3">Medium</span>
      <span class="chip" data-f="2">Low</span>
      <span class="chip" data-f="1">Minimal</span>
    </div>
    <div class="card"><div class="majors" id="allList">${allInc}</div></div>`;

  drawTrend(rep.trend_14d);
  wireFilter();
}

function wireFilter(){
  const bar=document.getElementById("sevFilter");
  if(!bar) return;
  bar.onclick=e=>{
    const c=e.target.closest(".chip"); if(!c) return;
    bar.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
    c.classList.add("on");
    const f=c.dataset.f;
    document.querySelectorAll("#allList .inc").forEach(el=>{
      el.style.display=(f==="all"||el.dataset.sev===f)?"":"none";
    });
  };
}

function drawTrend(trend){
  const ctx = document.getElementById("trend");
  if(chart) chart.destroy();
  const grid="rgba(255,255,255,.06)", muted="#585858";
  chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:trend.map(p=>p.day.slice(5)),
      datasets:[
        {label:"Total",data:trend.map(p=>p.total),borderColor:"#F5B800",backgroundColor:"rgba(245,184,0,.10)",fill:true,tension:.35,pointRadius:3,pointBackgroundColor:"#F5B800",borderWidth:2},
        {label:"Major (S4+)",data:trend.map(p=>p.major),borderColor:"#FF6B35",backgroundColor:"transparent",tension:.35,pointRadius:2,borderWidth:2,borderDash:[4,3]}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#A8A8A8",font:{family:"JetBrains Mono",size:11},usePointStyle:true,boxWidth:8}}},
      scales:{
        x:{grid:{color:grid},ticks:{color:muted,font:{family:"JetBrains Mono",size:10}}},
        y:{grid:{color:grid},ticks:{color:muted,font:{family:"JetBrains Mono",size:10}},beginAtZero:true}
      }
    }
  });
}

// Agar URL me ?sweep_id=NN hai to wahi din ka data kholo (email link se). Warna latest.
const _params = new URLSearchParams(location.search);
const _sweep = _params.get("sweep_id") || _params.get("sweep");
load(_sweep || undefined);
</script>
</body>
</html>
